# 科技圈发布会雷达 · nginx 反向代理
# 备案前：用 IP 访问本 80 端口配置即可
# 备案通过后：certbot --nginx -d nextlaunch.cn 会自动改写本文件加上 HTTPS
server {
    listen 80 default_server;
    server_name nextlaunch.cn _;

    client_max_body_size 2m;

    # 内部接口不对公网开放（运营脚本走 127.0.0.1:8787 直连）
    location /internal/ {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        # 覆盖（而非追加）客户端可伪造的 XFF，后端限频依赖可信来源 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
